<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Simple SVG Favicon for the Plant Store -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="module" src="/src/main.ts"></script>
